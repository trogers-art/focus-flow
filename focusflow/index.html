<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a14'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%23c9a96e'%3E✦%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="witchy-canvas"></canvas>

  <div id="app">
    <!-- TOP BAR -->
    <header id="topbar">
      <span class="logo">✦ FOCUSFLOW</span>
      <button class="tb-btn" id="btn-modules">＋ Modules</button>
      <button class="tb-btn" id="btn-scene">🎨 Scene</button>
      <button class="tb-btn" id="btn-mantra">✦ Mantra</button>
      <div class="spacer"></div>
      <span id="date-display"></span>
      <span id="clock-display"></span>
    </header>

    <!-- STAGE: modules live here -->
    <main id="stage"></main>

    <!-- MODULES PANEL -->
    <div class="panel" id="modules-panel">
      <div class="panel-title">Add Modules</div>
      <div id="module-list"></div>
    </div>

    <!-- SCENE PANEL -->
    <div class="panel" id="scene-panel">
      <div class="panel-title">Scene</div>
      <div class="bg-grid" id="bg-grid"></div>
    </div>
  </div>

  <!-- FULLSCREEN MANTRA OVERLAY -->
  <div id="mantra-overlay">
    <div class="mantra-text" id="mantra-text"></div>
    <div class="mantra-author" id="mantra-author"></div>
    <div class="mantra-hint">CLICK ANYWHERE TO CLOSE</div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/background.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/modules/planner.js"></script>
  <script src="js/modules/timer.js"></script>
  <script src="js/modules/quote.js"></script>
  <script src="js/modules/mood.js"></script>
  <script src="js/modules/audio-module.js"></script>
  <script src="js/modules/braindump.js"></script>
  <script src="js/modules/focusword.js"></script>
  <script src="js/modules-manager.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
